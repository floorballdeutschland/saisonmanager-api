name: CI

on:
  pull_request:
    branches: [main, staging]
  push:
    branches: [main, staging]

jobs:
  ci:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: saisonmanager
          POSTGRES_PASSWORD: saisonmanager
          POSTGRES_DB: saisonmanager-api_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      RAILS_ENV: test
      CI: true
      DB_HOST: localhost
      DB_PORT: 5432
      DB_USERNAME: saisonmanager
      DB_PASSWORD: saisonmanager

    steps:
      - uses: actions/checkout@v6

      # libvips wird von ruby-vips beim Boot via FFI geladen (ActiveStorage variant_processor :vips).
      # Paketname auf Ubuntu 24.04 ist libvips42t64; Fallback für ältere Runner-Images.
      - name: Install libvips
        run: sudo apt-get update && sudo apt-get install -y libvips42t64 || sudo apt-get install -y libvips42

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2.4'
          bundler-cache: true

      - name: Create and migrate database
        run: bundle exec rails db:create db:migrate

      - name: Test
        run: bundle exec rails test

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

      - name: RuboCop
        run: bundle exec rubocop --no-color
        # --no-color for cleaner CI output
